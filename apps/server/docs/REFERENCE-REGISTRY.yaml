      - src/lib/agent-logger.ts#AgentLogEntry
    version: 2
    updated: 2025-12-24
    status: active
    changelog:
      - "v2: Added log() method to prevent 'not a function' errors"
      - "v1: Initial start()/success()/error() pattern"
    consumers:
      - src/lib/graph-link/writer.ts
      - src/lib/scout/agent.ts
      - src/lib/gardener/service.ts
      - src/mcp/tools/ingest.ts

