  infra/logger:
    description: "Environment-aware logger for MCP stdio compatibility"
    code:
      - src/lib/logger.ts#log
      - src/lib/logger.ts#logError
      - src/lib/logger.ts#logWarn
      - src/lib/logger.ts#enableMcpMode
      - src/lib/logger.ts#createLogger
    docs:
      - docs/CODE-DOC-SYNC.md#logger-module
    version: 1
    updated: 2025-12-21
    status: active
    notes: |
      Solves MCP stdio pollution problem:
      - MCP mode: all logs → stderr (safe for JSON-RPC)
      - HTTP mode: log() → stdout, logError() → stderr
      Consumers: ai-clients.ts, scout/agent.ts, mcp/tools/*.ts

  infra/agent-logger:
